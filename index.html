<!DOCTYPE html>
<html>
<head>
  <link rel="apple-touch-startup-image" href="splash.png">
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">

<link rel="apple-touch-icon" href="icon.png">
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f1a;
      color: #e5e7eb;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-title {
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .task {
      padding: 14px;
      margin: 8px 0;
      background: #1f2937;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      background: #16a34a;
      text-decoration: line-through;
    }

    .streak {
      font-size: 12px;
      color: #fbbf24;
    }

    input, select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 8px;
      border-radius: 12px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg,#3b82f6,#6366f1);
      color: white;
    }

    .meal-item {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 14px;
    }

    .actions button {
      width: auto;
      padding: 4px 8px;
      margin-left: 5px;
      font-size: 12px;
      background: #374151;
    }

    .actions button:last-child {
      background: #ef4444;
    }
  </style>
</head>

<body>
  <div id="splashScreen">
  <img src="icon.png" style="width:100px;">
  <h1>Daily Tracker</h1>
</div>
<div class="container">

  <h2>Daily Tracker</h2>

  <div class="card">
    <div class="section-title">Habits</div>

    <div class="task" onclick="toggleTask(this,'teeth_am')">
      Brush Teeth AM <span class="streak" id="teeth_am"></span>
    </div>

    <div class="task" onclick="toggleTask(this,'skin_am')">
      Skincare AM <span class="streak" id="skin_am"></span>
    </div>

    <div class="task" onclick="toggleTask(this,'teeth_pm')">
      Brush Teeth PM <span class="streak" id="teeth_pm"></span>
    </div>

    <div class="task" onclick="toggleTask(this,'skin_pm')">
      Skincare PM <span class="streak" id="skin_pm"></span>
    </div>

  </div>

  <div class="card">
    <div class="section-title">Meals</div>

    <input id="mealInput" placeholder="Meal name">
    <input id="calInput" type="number" placeholder="Calories">

    <select id="mealType">
      <option>Breakfast</option>
      <option>Lunch</option>
      <option>Dinner</option>
    </select>

    <button onclick="addMeal()">Add Meal</button>

    <div id="mealList"></div>
  </div>

  <div class="card">
    <div class="section-title">Weekly Calories</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

// DATE
function todayKey(offset=0){
  const d=new Date();
  d.setDate(d.getDate()-offset);
  return d.toISOString().split("T")[0];
}

// ---------- HABITS + STREAKS ----------
function toggleTask(el,key){
  el.classList.toggle("done");

  let data=JSON.parse(localStorage.getItem("streaks"))||{};
  const today=new Date().toDateString();

  if(!data[key]){
    data[key]={count:0,last:null};
  }

  if(data[key].last!==today){
    data[key].count++;
    data[key].last=today;
  }

  localStorage.setItem("streaks",JSON.stringify(data));
  updateStreakUI();
}

function updateStreakUI(){
  const data=JSON.parse(localStorage.getItem("streaks"))||{};
  ["teeth_am","skin_am","teeth_pm","skin_pm"].forEach(k=>{
    document.getElementById(k).innerText = (data[k]?.count||0)+" 🔥";
  });
}

// ---------- MEALS ----------
function addMeal(){
  const meal=document.getElementById("mealInput").value.trim();
  const cal=parseInt(document.getElementById("calInput").value)||0;
  const type=document.getElementById("mealType").value;

  if(!meal) return;

  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key))||{Breakfast:[],Lunch:[],Dinner:[]};

  meals[type].push({name:meal,cal:cal});
  localStorage.setItem(key,JSON.stringify(meals));

  document.getElementById("mealInput").value="";
  document.getElementById("calInput").value="";

  displayMeals();
  renderChart();
}

function displayMeals(){
  const meals=JSON.parse(localStorage.getItem("meals-"+todayKey()))||{Breakfast:[],Lunch:[],Dinner:[]};

  function render(type){
    return `<h4>${type}</h4>`+meals[type].map((m,i)=>
      `<div class="meal-item">
        ${m.name} (${m.cal})
        <div class="actions">
          <button onclick="editMeal('${type}',${i})">Edit</button>
          <button onclick="deleteMeal('${type}',${i})">X</button>
        </div>
      </div>`
    ).join("");
  }

  document.getElementById("mealList").innerHTML=
    render("Breakfast")+render("Lunch")+render("Dinner");
}

function deleteMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));
  meals[type].splice(index,1);
  localStorage.setItem(key,JSON.stringify(meals));
  displayMeals();
  renderChart();
}

function editMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));

  const name=prompt("Meal:",meals[type][index].name);
  const cal=prompt("Calories:",meals[type][index].cal);

  if(name){
    meals[type][index]={name:name,cal:parseInt(cal)||0};
    localStorage.setItem(key,JSON.stringify(meals));
    displayMeals();
    renderChart();
  }
}

// ---------- CHART ----------
let chart;

function renderChart(){
  const labels=[];
  const data=[];

  for(let i=6;i>=0;i--){
    const date=todayKey(i);
    labels.push(date.slice(5));

    const meals=JSON.parse(localStorage.getItem("meals-"+date))||{Breakfast:[],Lunch:[],Dinner:[]};

    let total=0;
    ["Breakfast","Lunch","Dinner"].forEach(t=>{
      meals[t].forEach(m=> total+=m.cal||0);
    });

    data.push(total);
  }

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Calories',
        data:data,
        tension:0.4
      }]
    },
    options:{
      animation:{duration:800},
      plugins:{legend:{labels:{color:'white'}}},
      scales:{
        x:{ticks:{color:'white'}},
        y:{ticks:{color:'white'}}
      }
    }
  });
}

// INIT
displayMeals();
renderChart();
updateStreakUI();

</script>

</body>
</html>
