<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px auto;
      border-radius: 15px;
      max-width: 400px;
    }

    .task {
      padding: 12px;
      margin: 8px 0;
      background: #334155;
      border-radius: 10px;
      cursor: pointer;
    }

    .done {
      background: #22c55e;
      text-decoration: line-through;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      width: 100%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    .meal-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .small-btn {
      background: #ef4444;
      border: none;
      color: white;
      border-radius: 5px;
      padding: 2px 6px;
      cursor: pointer;
    }

    .streak {
      text-align: center;
      margin-top: 10px;
    }

    .summary {
      background: #334155;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Daily Tracker</h1>

<div class="card">
  <h3>Morning</h3>
  <div class="task" onclick="toggleTask(this,0)">Brush Teeth (AM)</div>
  <div class="task" onclick="toggleTask(this,1)">Skincare (AM)</div>
</div>

<div class="card">
  <h3>Night</h3>
  <div class="task" onclick="toggleTask(this,2)">Brush Teeth (PM)</div>
  <div class="task" onclick="toggleTask(this,3)">Skincare (PM)</div>
</div>

<div class="card">
  <h3>Meals</h3>
  <input id="mealInput" placeholder="Enter meal...">
  <select id="mealType">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
  </select>
  <button onclick="addMeal()">Add Meal</button>
  <div id="mealList"></div>
</div>

<div class="card">
  <h3>🔥 Streak</h3>
  <div class="streak">
    Current: <span id="streak">0</span> days<br>
    Best: <span id="best">0</span>
  </div>
</div>

<div class="card">
  <h3>Weekly Summary</h3>
  <div id="weeklySummary"></div>
</div>

<script>
function todayKey(offset=0){
  const d=new Date();
  d.setDate(d.getDate()-offset);
  return d.toISOString().split("T")[0];
}

// TASKS
function toggleTask(el,index){
  el.classList.toggle("done");
  saveTasks();
  checkStreak();
}

function saveTasks(){
  const tasks=[...document.querySelectorAll(".task")].map(t=>t.classList.contains("done"));
  localStorage.setItem("tasks-"+todayKey(),JSON.stringify(tasks));
}

function loadTasks(){
  const lastDate=localStorage.getItem("lastDate");
  if(lastDate!==todayKey()){
    localStorage.setItem("lastDate",todayKey());
    localStorage.removeItem("tasks-"+todayKey());
  }

  const data=JSON.parse(localStorage.getItem("tasks-"+todayKey()));
  if(!data)return;
  document.querySelectorAll(".task").forEach((t,i)=>{
    if(data[i])t.classList.add("done");
  });
}

// MEALS
function addMeal(){
  const meal=document.getElementById("mealInput").value.trim();
  const type=document.getElementById("mealType").value;
  if(!meal)return;

  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key))||{Breakfast:[],Lunch:[],Dinner:[]};

  meals[type].push(meal);
  localStorage.setItem(key,JSON.stringify(meals));
  document.getElementById("mealInput").value="";
  displayMeals();
}

function displayMeals(){
  const meals=JSON.parse(localStorage.getItem("meals-"+todayKey()))||{Breakfast:[],Lunch:[],Dinner:[]};

  function render(type){
    return `<h4>${type}</h4>`+meals[type].map((m,i)=>
      `<div class="meal-item">${m}
        <span>
          <button class="small-btn" onclick="editMeal('${type}',${i})">✏️</button>
          <button class="small-btn" onclick="deleteMeal('${type}',${i})">x</button>
        </span>
      </div>`
    ).join("");
  }

  document.getElementById("mealList").innerHTML=
    render("Breakfast")+render("Lunch")+render("Dinner");
}

function deleteMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));
  meals[type].splice(index,1);
  localStorage.setItem(key,JSON.stringify(meals));
  displayMeals();
}

function editMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));
  const newMeal=prompt("Edit meal:",meals[type][index]);
  if(newMeal){
    meals[type][index]=newMeal;
    localStorage.setItem(key,JSON.stringify(meals));
    displayMeals();
  }
}

// STREAK
function checkStreak(){
  const allDone=[...document.querySelectorAll(".task")].every(t=>t.classList.contains("done"));
  if(!allDone)return;

  let streak=parseInt(localStorage.getItem("streak")||0);
  let best=parseInt(localStorage.getItem("best")||0);
  const last=localStorage.getItem("lastComplete");

  const yesterday=new Date();
  yesterday.setDate(yesterday.getDate()-1);

  if(last===yesterday.toDateString()){
    streak++;
  } else if(last!==new Date().toDateString()){
    streak=1;
  }

  if(streak>best)best=streak;

  localStorage.setItem("streak",streak);
  localStorage.setItem("best",best);
  localStorage.setItem("lastComplete",new Date().toDateString());

  updateStreak();
}

function updateStreak(){
  document.getElementById("streak").innerText=localStorage.getItem("streak")||0;
  document.getElementById("best").innerText=localStorage.getItem("best")||0;
}

// WEEKLY
function generateSummary(){
  let total={Breakfast:0,Lunch:0,Dinner:0};
  let html="";

  for(let i=0;i<7;i++){
    const meals=JSON.parse(localStorage.getItem("meals-"+todayKey(i)))||{Breakfast:[],Lunch:[],Dinner:[]};
    total.Breakfast+=meals.Breakfast.length;
    total.Lunch+=meals.Lunch.length;
    total.Dinner+=meals.Dinner.length;

    html+=`<div class="summary">
      ${todayKey(i)}<br>
      B:${meals.Breakfast.length} L:${meals.Lunch.length} D:${meals.Dinner.length}
    </div>`;
  }

  html=`<div class="summary"><strong>Totals</strong><br>
    B:${total.Breakfast} L:${total.Lunch} D:${total.Dinner}
  </div>`+html;

  document.getElementById("weeklySummary").innerHTML=html;
}

// INIT
loadTasks();
displayMeals();
updateStreak();
generateSummary();
</script>

</body>
</html>
