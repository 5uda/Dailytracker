<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #0b0f1a;
      color: #e5e7eb;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .section-title {
      font-size: 16px;
      margin-bottom: 10px;
      color: #9ca3af;
    }

    .task {
      padding: 14px;
      margin: 8px 0;
      background: #1f2937;
      border-radius: 12px;
      font-size: 15px;
      transition: 0.2s;
    }

    .task:active {
      transform: scale(0.98);
    }

    .done {
      background: #16a34a;
      text-decoration: line-through;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 12px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-size: 15px;
      font-weight: 500;
    }

    .meal-item {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 14px;
    }

    .actions button {
      width: auto;
      padding: 4px 8px;
      margin-left: 5px;
      border-radius: 6px;
      font-size: 12px;
      background: #374151;
    }

    .actions button:last-child {
      background: #ef4444;
    }

    canvas {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Daily Tracker</h1>
  <div class="subtitle">Stay consistent, track smarter</div>

  <div class="card">
    <div class="section-title">Morning</div>
    <div class="task" onclick="toggleTask(this)">Brush Teeth</div>
    <div class="task" onclick="toggleTask(this)">Skincare</div>
  </div>

  <div class="card">
    <div class="section-title">Night</div>
    <div class="task" onclick="toggleTask(this)">Brush Teeth</div>
    <div class="task" onclick="toggleTask(this)">Skincare</div>
  </div>

  <div class="card">
    <div class="section-title">Meals</div>

    <input id="mealInput" placeholder="Meal name">
    <input id="calInput" type="number" placeholder="Calories">

    <select id="mealType">
      <option>Breakfast</option>
      <option>Lunch</option>
      <option>Dinner</option>
    </select>

    <button onclick="addMeal()">Add Meal</button>

    <div id="mealList"></div>
  </div>

  <div class="card">
    <div class="section-title">Weekly Calories</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
function todayKey(offset=0){
  const d=new Date();
  d.setDate(d.getDate()-offset);
  return d.toISOString().split("T")[0];
}

function toggleTask(el){
  el.classList.toggle("done");
}

// MEALS
function addMeal(){
  const meal=document.getElementById("mealInput").value.trim();
  const cal=parseInt(document.getElementById("calInput").value)||0;
  const type=document.getElementById("mealType").value;

  if(!meal) return;

  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key))||{Breakfast:[],Lunch:[],Dinner:[]};

  meals[type].push({name:meal,cal:cal});
  localStorage.setItem(key,JSON.stringify(meals));

  document.getElementById("mealInput").value="";
  document.getElementById("calInput").value="";

  displayMeals();
  renderChart();
}

function displayMeals(){
  const meals=JSON.parse(localStorage.getItem("meals-"+todayKey()))||{Breakfast:[],Lunch:[],Dinner:[]};

  function render(type){
    return `<h4>${type}</h4>`+meals[type].map((m,i)=>
      `<div class="meal-item">
        ${m.name} (${m.cal})
        <div class="actions">
          <button onclick="editMeal('${type}',${i})">Edit</button>
          <button onclick="deleteMeal('${type}',${i})">X</button>
        </div>
      </div>`
    ).join("");
  }

  document.getElementById("mealList").innerHTML=
    render("Breakfast")+render("Lunch")+render("Dinner");
}

function deleteMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));
  meals[type].splice(index,1);
  localStorage.setItem(key,JSON.stringify(meals));
  displayMeals();
  renderChart();
}

function editMeal(type,index){
  const key="meals-"+todayKey();
  const meals=JSON.parse(localStorage.getItem(key));

  const name=prompt("Meal:",meals[type][index].name);
  const cal=prompt("Calories:",meals[type][index].cal);

  if(name){
    meals[type][index]={name:name,cal:parseInt(cal)||0};
    localStorage.setItem(key,JSON.stringify(meals));
    displayMeals();
    renderChart();
  }
}

// CHART
let chart;

function renderChart(){
  const labels=[];
  const data=[];

  for(let i=6;i>=0;i--){
    const date=todayKey(i);
    labels.push(date.slice(5));

    const meals=JSON.parse(localStorage.getItem("meals-"+date))||{Breakfast:[],Lunch:[],Dinner:[]};

    let total=0;
    ["Breakfast","Lunch","Dinner"].forEach(t=>{
      meals[t].forEach(m=> total+=m.cal||0);
    });

    data.push(total);
  }

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Calories',
        data:data,
        borderWidth:2,
        tension:0.4
      }]
    },
    options:{
      plugins:{
        legend:{labels:{color:'white'}}
      },
      scales:{
        x:{ticks:{color:'white'}},
        y:{ticks:{color:'white'}}
      }
    }
  });
}

displayMeals();
renderChart();
</script>

</body>
</html>
